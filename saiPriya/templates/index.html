let trackingInterval = null;

function startAutoRefresh() {
    if (trackingInterval) return; // prevent multiple intervals

    trackingInterval = setInterval(() => {
        trackQuote(true); // silent refresh
    }, 10000);
}

function stopAutoRefresh() {
    if (trackingInterval) {
        clearInterval(trackingInterval);
        trackingInterval = null;
    }
}

    document.getElementById('app-content').innerHTML = `
        <div class="max-w-xl mx-auto p-12 space-y-6">

            class="w-full p-4 border rounded-xl">

            <input id="track-phone" placeholder="Enter Phone Number"
            class="w-full p-4 border rounded-xl">

            
            <button type="button" onclick="trackQuote()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">
                 Track Status
            </button>


            <div id="track-result"></div>
        </div>
    `;
    
}
async function trackQuote(isAuto = false) {

    const id = document.getElementById("track-id").value.trim();
    const phone = document.getElementById("track-phone").value.trim();

    if (!id || !phone) {
        if (!isAuto) alert("Please enter RFQ ID and Phone Number");
        return;
    }

    try {
        const res = await fetch("/api/track", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                quote_id: id,
                phone: phone
            })
        });

        const data = await res.json();
        const resultDiv = document.getElementById("track-result");

        if (data.error) {
            resultDiv.innerHTML = `<p class="text-red-600">${data.error}</p>`;
            stopAutoRefresh();
        } else {
            resultDiv.innerHTML = `
                <div class="p-4 bg-green-100 rounded-xl">
                    <p><b>Status:</b> ${data.status}</p>
                    <p><b>Product:</b> ${data.item}</p>
                    <p><b>Client:</b> ${data.name}</p>
                </div>
            `;

            if (!isAuto) startAutoRefresh(); 
        }

    } catch (err) {
        console.error(err);
        stopAutoRefresh();
    }
}


async function checkStatus() {
    const id = document.getElementById('track-id').value;

    const res = await fetch('/api/quotes');
    
    const data = await res.json();

    const found = data.find(q => q.id === id);

    if(found){
        document.getElementById('track-result').innerHTML =
            "Status: <span class='text-blue-600'>" + found.status + "</span>";
    } else {
        document.getElementById('track-result').innerText = "RFQ Not Found";
    }
}

        async function saveQuote(e) {
    e.preventDefault();

    const data = {
        name: document.getElementById('q-name').value,
        phone: document.getElementById('q-phone').value,
        item: document.getElementById('q-item').value,
        detail: document.getElementById('q-detail').value,
        address: document.getElementById('q-address').value,
        latitude: document.getElementById('latitude').value,
        longitude: document.getElementById('longitude').value
    };

    try {
        const response = await fetch('/api/quote', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        alert("Quote Submitted Successfully! ID: " + result.quote_id);
        showView('track');

    } catch (error) {
        console.error("Error:", error);
        alert("Submission failed!");
    }
}

        function generateGSTBill() {
            const client = document.getElementById('inv-client').value || 'VALUED CUSTOMER';
            const gstin = document.getElementById('inv-gstin').value || 'NOT PROVIDED';
            const hsn = document.getElementById('inv-hsn').value || '8544';
            const base = parseFloat(document.getElementById('inv-amt').value || 0);
            const rate = parseInt(document.getElementById('inv-gst-rate').value);
            const gstAmt = (base * rate / 100);
            const total = (base + gstAmt).toLocaleString();

            const modal = document.createElement('div');
            modal.className = "fixed inset-0 z-[300] bg-slate-950 flex items-center justify-center p-4";
            modal.innerHTML = `
                <div class="bg-white w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl">
                    <div id="pdf-content" class="p-16">
                        <div class="flex justify-between border-b-4 border-slate-900 pb-8 mb-10">
                            <h1 class="text-3xl font-black italic">TAX INVOICE</h1>
                            <div class="text-right italic font-black text-blue-600">PriyaElectrical</div>
                        </div>
                        <div class="grid grid-cols-2 gap-10 mb-10 text-[10px] font-black uppercase">
                            <div><p class="text-slate-400">Bill To</p><p class="text-lg">${client}</p><p class="mt-4 text-slate-400">GSTIN</p><p>${gstin}</p></div>
                            <div class="text-right"><p class="text-slate-400">Date</p><p>${new Date().toLocaleDateString()}</p><p class="mt-4 text-slate-400">HSN Code</p><p>${hsn}</p></div>
                        </div>
                        <div class="border-y py-6 mb-10 font-black flex justify-between bg-slate-50 px-6 rounded-xl italic">
                            <span>Industrial Electrical Supply</span><span>₹${base.toLocaleString()}</span>
                        </div>
                        <div class="flex flex-col items-end space-y-2">
                            <div class="w-64 flex justify-between text-slate-400 font-bold text-xs italic"><span>GST (${rate}%)</span><span>₹${gstAmt.toLocaleString()}</span></div>
                            <div class="w-64 flex justify-between text-3xl font-black italic border-t pt-4"><span>TOTAL</span><span>₹${total}</span></div>
                        </div>
                    </div>
                    <div class="p-8 bg-slate-50 flex gap-4">

                        <button onclick="this.parentElement.parentElement.parentElement.remove()" class="flex-1 bg-slate-300 py-4 rounded-xl font-black uppercase text-xs">Close</button>
                    </div>
                </div>

        function getLocation() {
    if (!navigator.geolocation) {
        alert("Geolocation not supported.");
        return;
    }

    navigator.geolocation.getCurrentPosition(async function(position) {

        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        document.getElementById("latitude").value = lat;
        document.getElementById("longitude").value = lon;

        // 🔥 Reverse Geocoding using OpenStreetMap
        const response = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
        );

        const data = await response.json();

        document.getElementById("q-address").value = data.display_name;


        alert("Location captured successfully!");

    }, function(error) {
        alert("Location permission denied or unavailable.");
    });
}

// ================= GST BILL MODAL =================
function openGSTModal(rfqId) {
    const modal = document.createElement('div');
    modal.className = "fixed inset-0 z-[300] bg-black/50 flex items-center justify-center p-4";

    modal.innerHTML = `
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <h2 class="text-2xl font-black mb-4">Generate GST Invoice</h2>
            <div class="space-y-4">
                <input id="gst-client" placeholder="Client Name" class="w-full p-3 border rounded-xl" required>
                <input id="gst-phone" placeholder="Phone Number" class="w-full p-3 border rounded-xl" required>
                <input id="gst-invoice" placeholder="Invoice Number" class="w-full p-3 border rounded-xl" value="${rfqId}">
                <input id="gst-hsn" placeholder="HSN Code" class="w-full p-3 border rounded-xl" value="8544">
                <select id="gst-rate" class="w-full p-3 border rounded-xl">
                    <option value="5">5%</option>
                    <option value="10">10%</option>
                    <option value="12">12%</option>
                    <option value="18">18%</option>
                    <option value="20">20%</option>
                </select>
                <div class="flex gap-4">
                    <button onclick="generateGSTPDF('${rfqId}')" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold">Generate & Download</button>
                    <button onclick="this.parentElement.parentElement.parentElement.remove()" class="flex-1 bg-gray-300 py-3 rounded-xl font-bold">Cancel</button>
                </div>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
}

// ================= GENERATE GST PDF =================
async function generateGSTPDF(rfqId) {
    const client = document.getElementById('gst-client').value;
    const phone = document.getElementById('gst-phone').value;
    const invoice = document.getElementById('gst-invoice').value;
    const hsn = document.getElementById('gst-hsn').value;
    const rate = parseInt(document.getElementById('gst-rate').value);

    if(!client || !phone || !invoice || !hsn || !rate) {
        alert("Please fill all fields!");
        return;
    }

    // Call Flask backend
    const res = await fetch(`/api/bill/${rfqId}?client=${encodeURIComponent(client)}&phone=${encodeURIComponent(phone)}&invoice=${encodeURIComponent(invoice)}&hsn=${hsn}&rate=${rate}`);
    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Invoice_${invoice}.pdf`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.URL.revokeObjectURL(url);

    // Close modal
    document.querySelector('.fixed.inset-0').remove();
}

    if (!lat || !lng) {
        alert("Location not available");
        return;

    const mapURL = `https://www.google.com/maps?q=${lat},${lng}&output=embed`;

    modal.innerHTML = `
        <div class="bg-white p-4 rounded-lg w-96">

                class="mt-3 bg-red-500 text-white px-3 py-1 rounded">
                Close
            </button>
        </div>
    `;

    document.body.appendChild(modal);
}
